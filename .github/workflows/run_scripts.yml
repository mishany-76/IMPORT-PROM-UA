name: Scheduled Script Runner

on:
  schedule:
    - cron: '49 5,9,16 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository content
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Recreate secret files
        run: |
          # Создаем user.txt из секрета
          echo "${{ secrets.USER_EMAIL }}" > user.txt
          # Создаем key_sheet.json из секрета
          echo '${{ secrets.KEY_SHEET_JSON }}' > key_sheet.json

      - name: Execute main script
        env:
          # Основные секреты для Диспетчера
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          USER_EMAIL: ${{ secrets.USER_EMAIL }}
          GOOGLE_APPS_SCRIPT_URL: ${{ secrets.GOOGLE_APPS_SCRIPT_URL }}
          
          # Секреты для парсеров (они передаются внутрь через окружение)
          AGER_FEED_URL: ${{ secrets.AGER_FEED_URL }}
          AGER_USER_AGENT: ${{ secrets.AGER_USER_AGENT }}
          BAGSROOM_FEED_URL: ${{ secrets.BAGSROOM_FEED_URL }}
          FOOTBALLERS_FEED_URL: ${{ secrets.FOOTBALLERS_FEED_URL }}
          IZIDROP_FEED_URL: ${{ secrets.IZIDROP_FEED_URL }}
          KIRS_FEED_URL: ${{ secrets.KIRS_FEED_URL }}
          MOYDROP_FEED_URL: ${{ secrets.MOYDROP_FEED_URL }}
          SUBSCRIBERS_SERVICES_SPREADSHEET_ID: ${{ secrets.SUBSCRIBERS_SERVICES_SPREADSHEET_ID }}
          SUBSCRIBERS_SERVICES_URL: ${{ secrets.SUBSCRIBERS_SERVICES_URL }}
          PARS_AGER_SPREADSHEET_ID: ${{ secrets.PARS_AGER_SPREADSHEET_ID }}  <-- ДОБАВИТЬ ЭТУ СТРОКУ
          PARS_BAGSROOM_SPREADSHEET_ID: ${{ secrets.PARS_BAGSROOM_SPREADSHEET_ID }}  <-- ДОБАВИТЬ ЭТУ СТРОКУ
          PARS_FOOTBALLERS_SPREADSHEET_ID: ${{ secrets.PARS_FOOTBALLERS_SPREADSHEET_ID }}  <-- ДОБАВИТЬ ЭТУ СТРОКУ
          PARS_IZIDROP_SPREADSHEET_ID: ${{ secrets.PARS_IZIDROP_SPREADSHEET_ID }}  <-- ДОБАВИТЬ ЭТУ СТРОКУ
          PARS_KIRS_SPREADSHEET_ID: ${{ secrets.PARS_KIRS_SPREADSHEET_ID }}  <-- ДОБАВИТЬ ЭТУ СТРОКУ
          PARS_MOYDROP_SPREADSHEET_ID: ${{ secrets.PARS_MOYDROP_SPREADSHEET_ID }}  <-- ДОБАВИТЬ ЭТУ СТРОКУ
          #PARS_AGER_SPREADSHEET_ID: ${{ secrets.PARS_AGER_SPREADSHEET_ID }}  <-- ДОБАВИТЬ ЭТУ СТРОКУ
          
          
          # Если для других парсеров тоже созданы секреты - добавь их сюда по аналогии:
          # KIRS_FEED_URL: ${{ secrets.KIRS_FEED_URL }}
          
        run: python main.py

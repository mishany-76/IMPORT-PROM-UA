name: Scheduled Script Runner

on:
  schedule:
    # Запуск каждый день в 00:00 по UTC (настрой под себя)
    - cron: '0 16 * * *'
  workflow_dispatch: # Позволяет запускать скрипт вручную кнопкой

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository content
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Recreate secret files
        run: |
          # Создаем user.txt из секрета
          echo "${{ secrets.USER_EMAIL }}" > user.txt
          # Создаем key_sheet.json из секрета
          echo '${{ secrets.KEY_SHEET_JSON }}' > key_sheet.json

      - name: Execute main script
        env:
          # Передаем токены в переменные окружения, которые видит main.py
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          USER_EMAIL: ${{ secrets.USER_EMAIL }}
        run: python main.py
